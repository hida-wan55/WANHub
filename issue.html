<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>課題詳細 - WANHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <!-- サイドバー -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <a href="/dashboard.html">
        <div class="logo-icon"><i class="bi bi-kanban-fill"></i></div>
        WANHub
      </a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">メニュー</div>
      <a href="/dashboard.html" class="sidebar-link"><i class="bi bi-grid-fill"></i> ダッシュボード</a>
    </div>
    <div class="sidebar-section" style="flex:1">
      <div class="sidebar-label">プロジェクト</div>
      <div id="sidebar-projects"></div>
    </div>
    <div class="sidebar-footer">
      <div class="user-avatar" id="user-avatar-sidebar" style="cursor:pointer" data-bs-toggle="modal" data-bs-target="#profileModal">--</div>
      <div class="user-info" style="cursor:pointer" data-bs-toggle="modal" data-bs-target="#profileModal">
        <div class="user-name" id="user-name-sidebar">-</div>
        <div style="font-size:10px;color:rgba(201,214,227,0.45)">プロフィール設定</div>
      </div>
      <button class="logout-btn" onclick="logout()" title="ログアウト">
        <i class="bi bi-box-arrow-right"></i>
      </button>
    </div>
  </div>

  <!-- メインコンテンツ -->
  <div class="main-content">
    <div class="top-header">
      <div class="d-flex align-items-center gap-3">
        <a href="#" id="back-btn" class="back-btn">
          <i class="bi bi-arrow-left"></i> 戻る
        </a>
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/dashboard.html">ダッシュボード</a></li>
            <li class="breadcrumb-item"><a href="#" id="breadcrumb-project">-</a></li>
            <li class="breadcrumb-item active">課題詳細</li>
          </ol>
        </nav>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-sm btn-outline-secondary" id="copy-issue-btn">
          <i class="bi bi-copy me-1"></i>コピー
        </button>
        <button class="btn btn-sm btn-outline-danger" id="delete-issue-btn">
          <i class="bi bi-trash3 me-1"></i>削除
        </button>
      </div>
    </div>

    <div class="page-content">
      <div id="error-container" style="display:none" class="mb-3"></div>

      <div class="row g-4">
        <!-- 左：本文＋コメント -->
        <div class="col-lg-8">

          <!-- タイトル・詳細カード -->
          <div class="card mb-4">
            <div class="card-body">
              <!-- タイトル -->
              <div id="issue-num-display" style="font-size:12px;color:var(--text-muted);margin-bottom:4px"></div>
              <div class="d-flex align-items-start gap-2 mb-2">
                <div id="title-display" style="flex:1">
                  <h4 class="issue-detail-title" id="issue-title-text">読み込み中...</h4>
                </div>
                <button class="btn btn-sm btn-outline-secondary flex-shrink-0" id="edit-title-btn">
                  <i class="bi bi-pencil"></i>
                </button>
              </div>
              <div id="title-edit" style="display:none" class="mb-3">
                <input type="text" id="title-input" class="form-control mb-2">
                <div class="d-flex gap-2">
                  <button class="btn btn-sm btn-primary" id="save-title-btn">保存</button>
                  <button class="btn btn-sm btn-secondary" id="cancel-title-btn">キャンセル</button>
                </div>
              </div>

              <!-- いいねボタン -->
              <div class="mb-3">
                <button class="like-btn" id="like-btn">
                  <i class="bi bi-heart"></i>
                  <span id="like-count">0</span>
                </button>
              </div>

              <!-- 詳細 -->
              <div>
                <div class="d-flex justify-content-between align-items-center mb-2">
                  <span class="fw-semibold" style="font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.6px">詳細</span>
                  <button class="btn btn-sm btn-outline-secondary" id="edit-desc-btn" style="font-size:12px;padding:2px 8px">
                    <i class="bi bi-pencil me-1"></i>編集
                  </button>
                </div>
                <div id="desc-display" class="p-3 rounded"
                     style="background:#F8F9FA;min-height:80px;font-size:13.5px;line-height:1.65;white-space:pre-wrap">-</div>
                <div id="desc-edit" style="display:none">
                  <textarea id="desc-input" class="form-control mb-2" rows="7"></textarea>
                  <div class="d-flex gap-2">
                    <button class="btn btn-sm btn-primary" id="save-desc-btn">保存</button>
                    <button class="btn btn-sm btn-secondary" id="cancel-desc-btn">キャンセル</button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- 添付ファイルカード（ドラッグ&ドロップ対応） -->
          <div class="card mb-4 drop-zone" id="attachments-card">
            <div class="card-header d-flex justify-content-between align-items-center">
              <span><i class="bi bi-paperclip me-2"></i>添付ファイル</span>
              <label class="btn btn-sm btn-outline-primary mb-0" for="file-input" style="cursor:pointer">
                <i class="bi bi-upload me-1"></i>アップロード
                <input type="file" id="file-input" style="display:none" multiple>
              </label>
            </div>
            <div class="card-body">
              <div id="upload-status" style="display:none" class="mb-2">
                <div class="d-flex align-items-center gap-2 text-muted" style="font-size:13px">
                  <span class="spinner-border spinner-border-sm"></span>
                  <span id="upload-status-text">アップロード中...</span>
                </div>
              </div>
              <div id="attachments-list">
                <div class="text-center text-muted py-2" style="font-size:13.5px">読み込み中...</div>
              </div>
            </div>
          </div>

          <!-- サブタスクカード -->
          <div class="card mb-4" id="subtasks-card">
            <div class="card-header d-flex justify-content-between align-items-center">
              <span><i class="bi bi-diagram-2 me-2"></i>サブタスク</span>
              <button class="btn btn-sm btn-outline-primary" id="add-subtask-btn">
                <i class="bi bi-plus"></i> 追加
              </button>
            </div>
            <div class="card-body">
              <div id="subtasks-list">
                <p class="text-center text-muted py-2 mb-0" style="font-size:13.5px">読み込み中...</p>
              </div>
              <div id="subtask-form" style="display:none" class="mt-2">
                <input type="text" id="subtask-title-input" class="form-control form-control-sm mb-2" placeholder="サブタスクのタイトル">
                <div class="d-flex gap-2">
                  <button class="btn btn-sm btn-primary" id="save-subtask-btn">追加</button>
                  <button class="btn btn-sm btn-secondary" id="cancel-subtask-btn">キャンセル</button>
                </div>
              </div>
            </div>
          </div>

          <!-- コメントカード -->
          <div class="card">
            <div class="card-header">
              <i class="bi bi-chat-dots me-2"></i>コメント
            </div>
            <div class="card-body">
              <div id="comments-list">
                <div class="text-center text-muted py-3" style="font-size:13.5px">読み込み中...</div>
              </div>
              <hr class="my-3">
              <label class="form-label fw-semibold" style="font-size:12px;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-muted)">コメントを追加</label>
              <textarea id="comment-input" class="form-control mb-2" rows="3" placeholder="コメントを入力...（画像はCtrl+Vで貼り付け可能）"></textarea>
              <button class="btn btn-primary btn-sm" id="add-comment-btn">
                <i class="bi bi-send me-1"></i>送信
              </button>
            </div>
          </div>

        </div>

        <!-- 右：メタ情報パネル -->
        <div class="col-lg-4">
          <div class="issue-meta-panel">
            <div class="issue-meta-item">
              <div class="issue-meta-label">ステータス</div>
              <select id="meta-status" class="form-select form-select-sm"></select>
            </div>
            <div class="issue-meta-item">
              <div class="issue-meta-label">優先度</div>
              <select id="meta-priority" class="form-select form-select-sm">
                <option value="urgent">緊急</option>
                <option value="high">高</option>
                <option value="medium">中</option>
                <option value="low">低</option>
              </select>
            </div>
            <div class="issue-meta-item">
              <div class="issue-meta-label">担当者</div>
              <select id="meta-assignee" class="form-select form-select-sm">
                <option value="">担当者なし</option>
              </select>
            </div>
            <div class="issue-meta-item">
              <div class="issue-meta-label">副担当（メンター）</div>
              <select id="meta-mentor" class="form-select form-select-sm">
                <option value="">副担当なし</option>
              </select>
            </div>
            <div class="issue-meta-item">
              <div class="issue-meta-label">親課題</div>
              <div id="parent-display"></div>
              <div id="parent-search" style="display:none" class="mt-1">
                <input type="text" id="parent-search-input" class="form-control form-control-sm" placeholder="課題タイトルを検索...">
                <div id="parent-search-results" class="parent-search-results" style="display:none"></div>
                <button class="btn btn-link btn-sm p-0 mt-1" id="cancel-parent-btn" style="font-size:12px;color:var(--text-muted)">キャンセル</button>
              </div>
            </div>
            <div class="issue-meta-item">
              <div class="issue-meta-label">ラベル</div>
              <div id="label-display" class="d-flex flex-wrap gap-1 mt-1"></div>
              <div id="label-picker" class="label-picker" style="display:none"></div>
              <button class="btn btn-link btn-sm p-0 mt-1" id="toggle-label-picker" style="font-size:12px">
                <i class="bi bi-tag me-1"></i>ラベルを編集
              </button>
            </div>
            <div class="issue-meta-item">
              <div class="issue-meta-label">開始日</div>
              <input type="date" id="meta-start-date" class="form-control form-control-sm">
            </div>
            <div class="issue-meta-item">
              <div class="issue-meta-label">期限日</div>
              <input type="date" id="meta-due-date" class="form-control form-control-sm">
            </div>
            <div class="issue-meta-item">
              <div class="issue-meta-label">予定工数（h）</div>
              <input type="number" id="meta-planned-hours" class="form-control form-control-sm" min="0" step="0.5" placeholder="例：2.0">
            </div>
            <div class="issue-meta-item">
              <div class="issue-meta-label">実績工数（h）</div>
              <input type="number" id="meta-actual-hours" class="form-control form-control-sm" min="0" step="0.5" placeholder="例：1.5">
            </div>
            <button class="btn btn-primary btn-sm w-100 mt-1" id="save-meta-btn">
              <i class="bi bi-check2 me-1"></i>変更を保存
            </button>
            <hr class="my-3">
            <div class="issue-meta-item">
              <div class="issue-meta-label">報告者</div>
              <div class="issue-meta-value" id="meta-reporter">-</div>
            </div>
            <div class="issue-meta-item">
              <div class="issue-meta-label">登録日</div>
              <div class="issue-meta-value" id="meta-created">-</div>
            </div>
            <div class="issue-meta-item">
              <div class="issue-meta-label">最終更新</div>
              <div class="issue-meta-value" id="meta-updated">-</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- プロフィール設定モーダル -->
  <div class="modal fade" id="profileModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-person-circle me-2"></i>プロフィール設定</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="text-center mb-4">
            <div id="profile-avatar-preview"
                 style="width:80px;height:80px;margin:0 auto 12px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:32px;color:white;overflow:hidden"></div>
            <label class="btn btn-sm btn-outline-secondary" for="avatar-file-input" style="cursor:pointer">
              <i class="bi bi-camera me-1"></i>画像を変更
              <input type="file" id="avatar-file-input" style="display:none" accept="image/*">
            </label>
          </div>
          <div>
            <label class="form-label fw-semibold" style="font-size:12px;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-muted)">テーマカラー</label>
            <div class="d-flex gap-2 flex-wrap mt-1" id="theme-color-picker"></div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">閉じる</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/issue.js"></script>
</body>
</html>
