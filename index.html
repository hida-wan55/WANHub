<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - WANHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon">
          <i class="bi bi-kanban-fill"></i>
        </div>
        <p class="login-title">WANHub</p>
        <p class="login-subtitle">社内プロジェクト管理ツール</p>
      </div>

      <div id="error-container" style="display:none"></div>

      <form id="login-form">
        <div class="mb-3">
          <label class="form-label">メールアドレス</label>
          <input type="email" id="email" class="form-control" placeholder="example@company.com" required>
        </div>
        <div class="mb-4">
          <label class="form-label">パスワード</label>
          <input type="password" id="password" class="form-control" placeholder="パスワードを入力" required>
        </div>
        <button type="submit" class="btn btn-primary w-100" id="login-btn">
          <span id="login-spinner" class="spinner-border spinner-border-sm me-2" style="display:none" role="status"></span>
          ログイン
        </button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (async () => {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) window.location.href = '/dashboard.html';
    })();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const spinner = document.getElementById('login-spinner');
      btn.disabled = true;
      spinner.style.display = 'inline-block';

      const { error } = await supabaseClient.auth.signInWithPassword({
        email:    document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
      });

      if (error) {
        showError('メールアドレスまたはパスワードが正しくありません');
        btn.disabled = false;
        spinner.style.display = 'none';
      } else {
        window.location.href = '/dashboard.html';
      }
    });
  </script>
</body>
</html>
