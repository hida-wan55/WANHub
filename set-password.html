<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>初期設定 - WANHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F0F4F8;
    }
    .setup-card {
      width: 460px;
      border-radius: 14px;
      box-shadow: 0 4px 28px rgba(0,0,0,0.09);
      border: 1px solid var(--border);
      background: #fff;
    }
    .setup-logo {
      width: 40px; height: 40px;
      background: var(--primary);
      border-radius: 10px;
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 8px;
    }
    .setup-logo i { font-size: 20px; color: #fff; }
    .name-preview {
      font-size: 12px; color: var(--text-muted);
      margin-top: 5px;
      min-height: 18px;
    }
    .name-preview .preview-name {
      color: var(--primary); font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="setup-card">
    <div class="card-body p-4 p-md-5">

      <!-- ロゴ -->
      <div class="text-center mb-4">
        <div class="setup-logo"><i class="bi bi-kanban-fill"></i></div>
        <div style="font-size:22px;font-weight:700;color:var(--text);line-height:1.2">WANHub</div>
        <div class="text-muted mt-1" style="font-size:13.5px">アカウント初期設定</div>
      </div>

      <!-- ローディング -->
      <div id="state-loading" class="text-center py-3">
        <div class="spinner-border text-primary" style="width:26px;height:26px;border-width:2px"></div>
        <p class="text-muted mt-2 mb-0" style="font-size:13.5px">認証情報を確認中...</p>
      </div>

      <!-- リンク期限切れ -->
      <div id="state-expired" style="display:none" class="text-center py-2">
        <i class="bi bi-clock-history text-warning" style="font-size:44px"></i>
        <p class="fw-semibold mt-3 mb-1" style="font-size:15px">招待リンクの有効期限が切れています</p>
        <p class="text-muted mb-4" style="font-size:13.5px">
          管理者に招待メールの再送を依頼してください。<br>
          Supabase Dashboard → Authentication → Users →<br>
          「…」→ Resend invite
        </p>
        <a href="/login.html" class="btn btn-outline-secondary btn-sm">ログインページへ</a>
      </div>

      <!-- 設定フォーム -->
      <div id="state-form" style="display:none">

        <div id="error-msg" class="alert alert-danger py-2 mb-3"
             style="display:none;font-size:13.5px;border-radius:8px"></div>

        <!-- 氏名 -->
        <div class="mb-3">
          <label class="form-label fw-semibold" style="font-size:13px">
            表示名（氏名）<span class="text-danger ms-1">*</span>
          </label>
          <div class="row g-2">
            <div class="col-6">
              <input type="text" id="last-name" class="form-control"
                     placeholder="姓（例：山田）" autocomplete="family-name">
              <div style="font-size:11px;color:var(--text-muted);margin-top:3px">姓</div>
            </div>
            <div class="col-6">
              <input type="text" id="first-name" class="form-control"
                     placeholder="名（例：太郎）" autocomplete="given-name">
              <div style="font-size:11px;color:var(--text-muted);margin-top:3px">名</div>
            </div>
          </div>
          <div class="name-preview" id="name-preview"></div>
        </div>

        <!-- パスワード -->
        <div class="mb-3">
          <label class="form-label fw-semibold" style="font-size:13px">
            パスワード<span class="text-danger ms-1">*</span>
          </label>
          <input type="password" id="password" class="form-control"
                 placeholder="6文字以上" autocomplete="new-password">
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold" style="font-size:13px">
            パスワード（確認）<span class="text-danger ms-1">*</span>
          </label>
          <input type="password" id="password-confirm" class="form-control"
                 placeholder="もう一度入力してください" autocomplete="new-password">
        </div>

        <button class="btn btn-primary w-100 fw-semibold" id="submit-btn"
                style="height:44px;font-size:15px;border-radius:8px">
          <i class="bi bi-check2-circle me-2"></i>設定して WANHub を開始
        </button>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script>
    'use strict';

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const hashParams     = new URLSearchParams(window.location.hash.slice(1));
    const hasError       = hashParams.has('error');
    const hasInviteToken = hashParams.has('access_token');

    let currentUser    = null;
    let expiredTimer   = null;

    // ---- 状態表示ヘルパー ----
    function showState(name) {
      ['loading', 'expired', 'form'].forEach(s => {
        document.getElementById('state-' + s).style.display = s === name ? 'block' : 'none';
      });
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    // ---- 氏名プレビュー ----
    function updateNamePreview() {
      const last  = document.getElementById('last-name').value.trim();
      const first = document.getElementById('first-name').value.trim();
      const prev  = document.getElementById('name-preview');
      if (last || first) {
        const full = [last, first].filter(Boolean).join(' ');
        prev.innerHTML = `表示名：<span class="preview-name">${full}</span>`;
      } else {
        prev.textContent = '';
      }
    }

    document.getElementById('last-name').addEventListener('input', updateNamePreview);
    document.getElementById('first-name').addEventListener('input', updateNamePreview);

    // ---- 既存プロフィールをプリフィル ----
    async function prefillProfile(userId) {
      const { data } = await supabaseClient
        .from('profiles').select('name').eq('id', userId).single();
      if (data?.name) {
        const parts = data.name.trim().split(' ');
        document.getElementById('last-name').value  = parts[0]            || '';
        document.getElementById('first-name').value = parts.slice(1).join(' ') || '';
        updateNamePreview();
      }
    }

    // ---- メイン処理 ----
    async function main() {
      // エラーハッシュが付いている場合は即座に期限切れ表示
      if (hasError) { showState('expired'); return; }

      // onAuthStateChange を先に登録（getSession より前に置かないとイベントを取りこぼす）
      const { data: { subscription } } = supabaseClient.auth.onAuthStateChange(
        async (event, session) => {
          if (currentUser) return;
          if (event === 'SIGNED_IN' && session) {
            currentUser = session.user;
            subscription.unsubscribe();
            if (expiredTimer) clearTimeout(expiredTimer);
            await prefillProfile(session.user.id);
            showState('form');
          }
        }
      );

      // ハッシュ処理が既に完了している場合は getSession() でセッションが返る
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) {
        if (!hasInviteToken) {
          subscription.unsubscribe();
          window.location.href = '/dashboard.html';
          return;
        }
        if (!currentUser) {
          currentUser = session.user;
          subscription.unsubscribe();
          await prefillProfile(session.user.id);
          showState('form');
        }
        return;
      }

      // トークンなし → ログインへ
      if (!hasInviteToken) {
        subscription.unsubscribe();
        window.location.href = '/login.html';
        return;
      }

      // トークンあり・セッション未確立 → onAuthStateChange で待つ（10秒タイムアウト）
      expiredTimer = setTimeout(() => {
        if (!currentUser) {
          subscription.unsubscribe();
          showState('expired');
        }
      }, 10000);
    }

    // ---- 送信処理 ----
    document.getElementById('submit-btn').addEventListener('click', async () => {
      const lastName  = document.getElementById('last-name').value.trim();
      const firstName = document.getElementById('first-name').value.trim();
      const password  = document.getElementById('password').value;
      const confirm   = document.getElementById('password-confirm').value;

      document.getElementById('error-msg').style.display = 'none';

      // バリデーション
      if (!lastName || !firstName) {
        showError('姓・名を入力してください');
        document.getElementById('last-name').focus();
        return;
      }
      if (!password) {
        showError('パスワードを入力してください');
        document.getElementById('password').focus();
        return;
      }
      if (password.length < 6) {
        showError('パスワードは6文字以上で設定してください');
        document.getElementById('password').focus();
        return;
      }
      if (password !== confirm) {
        showError('パスワードが一致しません');
        document.getElementById('password-confirm').focus();
        return;
      }

      const fullName = `${lastName} ${firstName}`; // 半角スペースで結合
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>設定中...';

      // 1. パスワードを設定
      const { error: pwErr } = await supabaseClient.auth.updateUser({ password });
      if (pwErr) {
        showError('パスワードの設定に失敗しました: ' + pwErr.message);
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-check2-circle me-2"></i>設定して WANHub を開始';
        return;
      }

      // 2. プロフィールに氏名を保存
      if (currentUser?.id) {
        await supabaseClient.from('profiles').upsert(
          { id: currentUser.id, name: fullName },
          { onConflict: 'id' }
        );
      }

      // 3. ダッシュボードへ
      window.location.href = '/dashboard.html';
    });

    // Enter キーで送信
    ['last-name','first-name','password','password-confirm'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('submit-btn').click();
      });
    });

    main();
  </script>
</body>
</html>
