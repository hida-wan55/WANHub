<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理設定 - WorkBoard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <!-- サイドバー -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <a href="/dashboard.html">
        <div class="logo-icon"><i class="bi bi-kanban-fill"></i></div>
        WorkBoard
      </a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">メニュー</div>
      <a href="/dashboard.html" class="sidebar-link"><i class="bi bi-grid-fill"></i> ダッシュボード</a>
      <a href="/admin.html" class="sidebar-link active"><i class="bi bi-gear-fill"></i> 管理設定</a>
    </div>
    <div class="sidebar-section" style="flex:1">
      <div class="sidebar-label">プロジェクト</div>
      <div id="sidebar-projects"></div>
    </div>
    <div class="sidebar-footer">
      <div class="user-avatar" id="user-avatar-sidebar">--</div>
      <div class="user-info">
        <div class="user-name" id="user-name-sidebar">-</div>
      </div>
      <button class="logout-btn" onclick="logout()" title="ログアウト">
        <i class="bi bi-box-arrow-right"></i>
      </button>
    </div>
  </div>

  <!-- メインコンテンツ -->
  <div class="main-content">
    <div class="top-header">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="/dashboard.html">ダッシュボード</a></li>
          <li class="breadcrumb-item active">管理設定</li>
        </ol>
      </nav>
    </div>

    <div class="page-content">
      <div id="error-container" style="display:none" class="mb-3"></div>

      <div class="row g-4">
        <!-- メンバー管理 -->
        <div class="col-lg-6">
          <div class="card">
            <div class="card-header">
              <i class="bi bi-people-fill me-2"></i>メンバー管理
            </div>
            <div class="card-body">
              <div class="alert alert-info" style="font-size:13px">
                <i class="bi bi-info-circle me-1"></i>
                メンバーの追加はSupabaseダッシュボード「Authentication → Users → Invite user」から行ってください。<br>
                ここでは表示名・管理者権限の変更ができます。
              </div>
              <div id="members-list">
                <div class="text-center text-muted py-3">読み込み中...</div>
              </div>
            </div>
          </div>
        </div>

        <!-- プロジェクト管理 -->
        <div class="col-lg-6">
          <div class="card">
            <div class="card-header">
              <i class="bi bi-folder-fill me-2"></i>プロジェクト管理
            </div>
            <div class="card-body">
              <div id="projects-admin-list">
                <div class="text-center text-muted py-3">読み込み中...</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- メンバー編集モーダル -->
  <div class="modal fade" id="editMemberModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">メンバー編集</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="edit-member-id">
          <div class="mb-3">
            <label class="form-label">表示名</label>
            <input type="text" id="edit-member-name" class="form-control">
          </div>
          <div class="form-check">
            <input type="checkbox" id="edit-member-admin" class="form-check-input">
            <label class="form-check-label" for="edit-member-admin">管理者権限を付与</label>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
          <button type="button" class="btn btn-primary" id="save-member-btn">保存</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
