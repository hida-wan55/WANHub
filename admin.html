<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理設定 - WANHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-logo">
      <a href="/dashboard.html">
        <div class="logo-icon"><i class="bi bi-kanban-fill"></i></div>
        WANHub
      </a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">メニュー</div>
      <a href="/dashboard.html" class="sidebar-link"><i class="bi bi-grid-fill"></i> ダッシュボード</a>
      <a href="/admin.html" class="sidebar-link active"><i class="bi bi-gear-fill"></i> 管理設定</a>
    </div>
    <div class="sidebar-section" style="flex:1">
      <div class="sidebar-label">プロジェクト</div>
      <div id="sidebar-projects"></div>
    </div>
    <div class="sidebar-footer">
      <div class="user-avatar" id="user-avatar-sidebar" style="cursor:pointer" data-bs-toggle="modal" data-bs-target="#profileModal">--</div>
      <div class="user-info" style="cursor:pointer" data-bs-toggle="modal" data-bs-target="#profileModal">
        <div class="user-name" id="user-name-sidebar">-</div>
        <div style="font-size:10px;color:rgba(201,214,227,0.45)">プロフィール設定</div>
      </div>
      <button class="logout-btn" onclick="logout()" title="ログアウト">
        <i class="bi bi-box-arrow-right"></i>
      </button>
    </div>
  </div>

  <div class="main-content">
    <div class="top-header">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="/dashboard.html">ダッシュボード</a></li>
          <li class="breadcrumb-item active">管理設定</li>
        </ol>
      </nav>
    </div>

    <div class="page-content">
      <div id="error-container" style="display:none" class="mb-3"></div>

      <div class="row g-4">
        <!-- メンバー管理 -->
        <div class="col-lg-6">
          <div class="card">
            <div class="card-header"><i class="bi bi-people-fill me-2"></i>メンバー管理</div>
            <div class="card-body">
<div id="members-list">
                <div class="text-center text-muted py-3">読み込み中...</div>
              </div>
            </div>
          </div>
        </div>

        <!-- プロジェクト管理 -->
        <div class="col-lg-6">
          <div class="card">
            <div class="card-header"><i class="bi bi-folder-fill me-2"></i>プロジェクト管理</div>
            <div class="card-body">
              <div id="projects-admin-list">
                <div class="text-center text-muted py-3">読み込み中...</div>
              </div>
            </div>
          </div>
        </div>

        <!-- ラベル管理 -->
        <div class="col-lg-6">
          <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
              <span><i class="bi bi-tag-fill me-2"></i>ラベル管理</span>
              <button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#addLabelModal">
                <i class="bi bi-plus-lg me-1"></i>追加
              </button>
            </div>
            <div class="card-body">
              <p class="text-muted" style="font-size:13px">課題に付けるラベルを管理します。</p>
              <div id="labels-list">
                <div class="text-center text-muted py-3">読み込み中...</div>
              </div>
            </div>
          </div>
        </div>

        <!-- ステータス管理 -->
        <div class="col-lg-6">
          <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
              <span><i class="bi bi-tags-fill me-2"></i>ステータス管理</span>
              <button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#addStatusModal">
                <i class="bi bi-plus-lg me-1"></i>追加
              </button>
            </div>
            <div class="card-body">
              <p class="text-muted" style="font-size:13px">課題のステータス項目を管理します。削除はステータスが未使用の場合のみ可能です。</p>
              <div id="statuses-list">
                <div class="text-center text-muted py-3">読み込み中...</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ラベル追加モーダル -->
  <div class="modal fade" id="addLabelModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">ラベルを追加</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="add-label-error" style="display:none" class="mb-3"></div>
          <div class="mb-3">
            <label class="form-label">ラベル名 <span class="text-danger">*</span></label>
            <input type="text" id="new-label-name" class="form-control" placeholder="例：バグ、機能追加、緊急">
          </div>
          <div class="mb-3">
            <label class="form-label">色</label>
            <div class="d-flex gap-2 align-items-center">
              <input type="color" id="new-label-color" class="form-control form-control-color" value="#1F6FEB">
              <span id="label-badge-preview" class="label-badge">プレビュー</span>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
          <button type="button" class="btn btn-primary" id="add-label-btn">追加</button>
        </div>
      </div>
    </div>
  </div>

  <!-- メンバー編集モーダル -->
  <div class="modal fade" id="editMemberModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-person-gear me-2"></i>メンバー編集</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="edit-member-id">
          <div class="mb-3">
            <label class="form-label fw-semibold" style="font-size:13px">表示名</label>
            <div class="row g-2">
              <div class="col-6">
                <input type="text" id="edit-member-last" class="form-control" placeholder="姓">
              </div>
              <div class="col-6">
                <input type="text" id="edit-member-first" class="form-control" placeholder="名">
              </div>
            </div>
          </div>
          <div class="mb-3" id="edit-member-role-section">
            <label class="form-label fw-semibold" style="font-size:13px">権限</label>
            <select id="edit-member-role" class="form-select">
              <option value="member">メンバー — 通常利用のみ</option>
              <option value="admin">管理者 — PJ削除・ステータス・ラベル管理</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
          <button type="button" class="btn btn-primary" id="save-member-btn">保存</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ステータス追加モーダル -->
  <div class="modal fade" id="addStatusModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">ステータスを追加</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="add-status-error" style="display:none" class="mb-3"></div>
          <div class="mb-3">
            <label class="form-label">ラベル（表示名）<span class="text-danger">*</span></label>
            <input type="text" id="new-status-label" class="form-control" placeholder="例：レビュー中">
          </div>
          <div class="mb-3">
            <label class="form-label">内部名（英数字・アンダースコア）<span class="text-danger">*</span></label>
            <input type="text" id="new-status-name" class="form-control" placeholder="例：in_review">
            <div class="form-text">ラベルを入力すると自動入力されます</div>
          </div>
          <div class="mb-3">
            <label class="form-label">バッジカラー</label>
            <div class="d-flex gap-2 align-items-center">
              <input type="color" id="new-status-color" class="form-control form-control-color" value="#1F6FEB">
              <span class="badge" id="status-badge-preview" style="font-size:13px;padding:5px 12px">プレビュー</span>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
          <button type="button" class="btn btn-primary" id="add-status-btn">追加</button>
        </div>
      </div>
    </div>
  </div>

  <!-- プロフィール設定モーダル -->
  <div class="modal fade" id="profileModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-person-circle me-2"></i>プロフィール設定</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="text-center mb-4">
            <div id="profile-avatar-preview"
                 style="width:80px;height:80px;margin:0 auto 12px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:32px;color:white;overflow:hidden"></div>
            <label class="btn btn-sm btn-outline-secondary" for="avatar-file-input" style="cursor:pointer">
              <i class="bi bi-camera me-1"></i>画像を変更
              <input type="file" id="avatar-file-input" style="display:none" accept="image/*">
            </label>
          </div>
          <div>
            <label class="form-label fw-semibold" style="font-size:12px;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-muted)">テーマカラー</label>
            <div class="d-flex gap-2 flex-wrap mt-1" id="theme-color-picker"></div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">閉じる</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
