<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>課題一覧 - WANHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-logo">
      <a href="/dashboard.html">
        <div class="logo-icon"><i class="bi bi-kanban-fill"></i></div>
        WANHub
      </a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">メニュー</div>
      <a href="/dashboard.html" class="sidebar-link"><i class="bi bi-grid-fill"></i> ダッシュボード</a>
    </div>
    <div class="sidebar-section" style="flex:1">
      <div class="sidebar-label">プロジェクト</div>
      <div id="sidebar-projects"></div>
    </div>
    <div class="sidebar-footer">
      <div class="user-avatar" id="user-avatar-sidebar" style="cursor:pointer" data-bs-toggle="modal" data-bs-target="#profileModal">--</div>
      <div class="user-info" style="cursor:pointer" data-bs-toggle="modal" data-bs-target="#profileModal">
        <div class="user-name" id="user-name-sidebar">-</div>
        <div style="font-size:10px;color:rgba(201,214,227,0.45)">プロフィール設定</div>
      </div>
      <button class="logout-btn" onclick="logout()" title="ログアウト">
        <i class="bi bi-box-arrow-right"></i>
      </button>
    </div>
  </div>

  <div class="main-content">
    <div class="top-header">
      <div class="d-flex align-items-center gap-3">
        <a href="/dashboard.html" class="back-btn">
          <i class="bi bi-arrow-left"></i> 戻る
        </a>
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/dashboard.html">ダッシュボード</a></li>
            <li class="breadcrumb-item active" id="breadcrumb-project">-</li>
          </ol>
        </nav>
      </div>
      <button class="btn btn-primary btn-sm guest-hidden" data-bs-toggle="modal" data-bs-target="#createIssueModal">
        <i class="bi bi-plus-lg me-1"></i>課題を追加
      </button>
    </div>

    <div class="page-content">
      <div id="error-container" style="display:none" class="mb-3"></div>

      <div class="card mb-3">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <div class="d-flex align-items-center gap-2 mb-1">
                <h5 class="mb-0 fw-bold" id="project-name">読み込み中...</h5>
                <span id="project-code-display" style="font-size:12px;color:var(--text-muted);font-weight:500"></span>
              </div>
              <p class="mb-1 text-muted" style="font-size:13.5px" id="project-desc"></p>
              <div id="project-members-display" class="d-flex align-items-center gap-1 flex-wrap mt-1"></div>
            </div>
            <div class="d-flex gap-2">
              <button class="btn btn-sm btn-outline-secondary" id="manage-members-btn" style="display:none">
                <i class="bi bi-people me-1"></i>メンバー
              </button>
              <button class="btn btn-sm btn-outline-secondary guest-hidden" data-bs-toggle="modal" data-bs-target="#editProjectModal">
                <i class="bi bi-pencil me-1"></i>編集
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- ビュー切替タブ -->
      <div class="view-tabs">
        <a href="#" id="tab-list"  class="view-tab active"><i class="bi bi-list-ul me-1"></i>リスト</a>
        <a href="#" id="tab-board" class="view-tab"><i class="bi bi-kanban me-1"></i>ボード</a>
        <a href="#" id="tab-wiki"  class="view-tab"><i class="bi bi-journal-text me-1"></i>Wiki</a>
        <a href="#" id="tab-gantt" class="view-tab"><i class="bi bi-bar-chart-steps me-1"></i>ガント</a>
      </div>

      <div class="filter-bar mb-3">
        <input type="text" id="search-input" class="form-control" style="width:200px" placeholder="課題を検索...">
        <select id="filter-status" class="form-select" style="width:130px">
          <option value="">ステータス：全て</option>
        </select>
        <select id="filter-priority" class="form-select" style="width:120px">
          <option value="">優先度：全て</option>
          <option value="urgent">緊急</option>
          <option value="high">高</option>
          <option value="medium">中</option>
          <option value="low">低</option>
        </select>
        <select id="filter-assignee" class="form-select" style="width:140px">
          <option value="">担当者：全て</option>
        </select>
        <select id="filter-label" class="form-select" style="width:130px">
          <option value="">ラベル：全て</option>
        </select>
        <select id="filter-overdue" class="form-select" style="width:120px">
          <option value="">期限：全て</option>
          <option value="overdue">期限切れのみ</option>
        </select>
        <button class="btn btn-sm btn-outline-secondary" id="clear-filters">リセット</button>
      </div>

      <div class="card">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="issue-table">
              <thead>
                <tr>
                  <th style="width:70px">番号</th>
                  <th style="width:34%">タイトル</th>
                  <th>ステータス</th>
                  <th>優先度</th>
                  <th>担当者</th>
                  <th>副担当</th>
                  <th>期限日</th>
                  <th>登録日</th>
                </tr>
              </thead>
              <tbody id="issues-tbody">
                <tr><td colspan="8" class="text-center py-4 text-muted">読み込み中...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="mt-2 text-muted" style="font-size:12px" id="issue-count"></div>
    </div>
  </div>

  <!-- 課題作成モーダル -->
  <div class="modal fade" id="createIssueModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">課題を追加</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="modal-error" style="display:none" class="mb-3"></div>
          <div class="mb-3">
            <label class="form-label">タイトル <span class="text-danger">*</span></label>
            <input type="text" id="issue-title" class="form-control" placeholder="課題のタイトルを入力">
          </div>
          <div class="mb-3">
            <label class="form-label">詳細</label>
            <textarea id="issue-desc" class="form-control" rows="4" placeholder="課題の詳細を入力"></textarea>
          </div>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">ステータス</label>
              <select id="issue-status" class="form-select"></select>
            </div>
            <div class="col-md-6">
              <label class="form-label">優先度</label>
              <select id="issue-priority" class="form-select">
                <option value="urgent">緊急</option>
                <option value="high">高</option>
                <option value="medium" selected>中</option>
                <option value="low">低</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">担当者</label>
              <select id="issue-assignee" class="form-select">
                <option value="">担当者なし</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">副担当（メンター）</label>
              <select id="issue-mentor" class="form-select">
                <option value="">副担当なし</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">期限日</label>
              <input type="date" id="issue-due-date" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label">開始日</label>
              <input type="date" id="issue-start-date" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label">予定工数（h）</label>
              <input type="number" id="issue-planned-hours" class="form-control" min="0" step="0.5" placeholder="例：2.0">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
          <button type="button" class="btn btn-primary" id="create-issue-btn">追加</button>
        </div>
      </div>
    </div>
  </div>

  <!-- プロジェクト編集モーダル -->
  <div class="modal fade" id="editProjectModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">プロジェクトを編集</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">PJコード</label>
            <input type="text" id="edit-project-code" class="form-control" maxlength="20" style="text-transform:uppercase">
          </div>
          <div class="mb-3">
            <label class="form-label">プロジェクト名 <span class="text-danger">*</span></label>
            <input type="text" id="edit-project-name" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">説明</label>
            <textarea id="edit-project-desc" class="form-control" rows="3"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
          <button type="button" class="btn btn-primary" id="update-project-btn">保存</button>
        </div>
      </div>
    </div>
  </div>

  <!-- メンバー管理モーダル -->
  <div class="modal fade" id="manageMembersModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-people me-2"></i>メンバー管理</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p class="text-muted mb-3" style="font-size:12.5px">
            チェックを入れたメンバーのみがこのPJを閲覧できます。<br>
            全員外すと全員がアクセス可能になります。
          </p>
          <div id="member-checkbox-list" style="max-height:340px;overflow-y:auto"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
          <button type="button" class="btn btn-primary" id="save-members-btn">保存</button>
        </div>
      </div>
    </div>
  </div>

  <!-- プロフィール設定モーダル -->
  <div class="modal fade" id="profileModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-person-circle me-2"></i>プロフィール設定</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="text-center mb-4">
            <div id="profile-avatar-preview"
                 style="width:80px;height:80px;margin:0 auto 12px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:32px;color:white;overflow:hidden"></div>
            <label class="btn btn-sm btn-outline-secondary" for="avatar-file-input" style="cursor:pointer">
              <i class="bi bi-camera me-1"></i>画像を変更
              <input type="file" id="avatar-file-input" style="display:none" accept="image/*">
            </label>
          </div>
          <div>
            <label class="form-label fw-semibold" style="font-size:12px;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-muted)">テーマカラー</label>
            <div class="d-flex gap-2 flex-wrap mt-1" id="theme-color-picker"></div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">閉じる</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/project.js"></script>
</body>
</html>
