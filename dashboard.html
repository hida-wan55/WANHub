<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダッシュボード - WANHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <!-- サイドバー -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <a href="/dashboard.html">
        <div class="logo-icon"><i class="bi bi-kanban-fill"></i></div>
        WANHub
      </a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">メニュー</div>
      <a href="/dashboard.html" class="sidebar-link active">
        <i class="bi bi-grid-fill"></i> ダッシュボード
      </a>
    </div>
    <div class="sidebar-section" style="flex:1">
      <div class="sidebar-label">プロジェクト</div>
      <div id="sidebar-projects">
        <div class="px-3 py-2" style="font-size:12px;color:rgba(201,214,227,0.4)">読み込み中...</div>
      </div>
    </div>
    <div class="sidebar-footer">
      <div class="user-avatar" id="user-avatar-sidebar" style="cursor:pointer" data-bs-toggle="modal" data-bs-target="#profileModal">--</div>
      <div class="user-info" style="cursor:pointer" data-bs-toggle="modal" data-bs-target="#profileModal">
        <div class="user-name" id="user-name-sidebar">-</div>
        <div style="font-size:10px;color:rgba(201,214,227,0.45)">プロフィール設定</div>
      </div>
      <button class="logout-btn" onclick="logout()" title="ログアウト">
        <i class="bi bi-box-arrow-right"></i>
      </button>
    </div>
  </div>

  <!-- メインコンテンツ -->
  <div class="main-content">
    <div class="top-header">
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-kanban-fill" style="color:var(--primary);font-size:18px"></i>
        <span style="font-size:17px;font-weight:700;color:var(--text)">WANHub</span>
        <span style="font-size:12px;color:var(--text-muted);margin-left:4px">ダッシュボード</span>
      </div>
      <div class="d-flex gap-2 align-items-center">
        <button class="btn btn-primary btn-sm guest-hidden" id="new-project-btn" style="display:none" data-bs-toggle="modal" data-bs-target="#createProjectModal">
          <i class="bi bi-plus-lg me-1"></i>新規プロジェクト
        </button>
        <a href="/admin.html" class="btn btn-outline-secondary btn-sm" id="admin-btn" style="display:none">
          <i class="bi bi-gear-fill me-1"></i>管理
        </a>
      </div>
    </div>

    <div class="page-content">
      <div id="error-container" style="display:none" class="mb-3"></div>

      <div class="row g-4">

        <!-- 左カラム：プロジェクト + 自分の課題 -->
        <div class="col-lg-5">

          <!-- プロジェクト一覧 -->
          <div class="dash-panel mb-4">
            <div class="dash-panel-header">
              <span class="dash-panel-title"><i class="bi bi-folder2"></i>プロジェクト</span>
            </div>
            <div id="projects-list">
              <div class="my-issue-empty">読み込み中...</div>
            </div>
          </div>

          <!-- 自分の課題 -->
          <div class="dash-panel">
            <div class="dash-panel-header">
              <span class="dash-panel-title"><i class="bi bi-person-check"></i>自分の課題</span>
            </div>
            <!-- タブ：担当 / 登録 -->
            <div class="dash-tab-bar">
              <span style="margin-right:4px">対象：</span>
              <button class="dash-tab-btn active" id="tab-assigned">担当（<span id="assigned-count">0</span>）</button>
              <button class="dash-tab-btn" id="tab-reported">登録（<span id="reported-count">0</span>）</button>
            </div>
            <!-- 期限フィルタ -->
            <div class="dash-due-bar">
              <span style="margin-right:4px">期限日：</span>
              <button class="dash-due-btn active" data-due="all">すべて</button>
              <button class="dash-due-btn" data-due="4days">4日以内（<span id="due-4days-count">0</span>）</button>
              <button class="dash-due-btn" data-due="today">今日まで（<span id="due-today-count">0</span>）</button>
              <button class="dash-due-btn" data-due="overdue">期限切れ（<span id="due-overdue-count">0</span>）</button>
            </div>
            <!-- テーブル -->
            <div id="my-issues-table">
              <div class="my-issue-empty">読み込み中...</div>
            </div>
          </div>

        </div>

        <!-- 右カラム：最近の更新 -->
        <div class="col-lg-7">
          <div class="dash-panel">
            <div class="dash-panel-header">
              <span class="dash-panel-title"><i class="bi bi-activity"></i>最近の更新</span>
              <div class="d-flex gap-2 align-items-center">
                <span style="font-size:12px;color:var(--text-muted)">フィルタ：</span>
                <select class="form-select form-select-sm" id="activity-filter" style="width:auto;font-size:12px;padding:2px 24px 2px 8px;height:28px">
                  <option value="all">すべて</option>
                  <option value="comment">コメント</option>
                  <option value="update">更新</option>
                  <option value="file">ファイル</option>
                </select>
              </div>
            </div>
            <div id="activity-feed" style="max-height:calc(100vh - 200px);overflow-y:auto">
              <div class="my-issue-empty">読み込み中...</div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- 新規プロジェクト作成モーダル -->
  <div class="modal fade" id="createProjectModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">新規プロジェクト作成</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="modal-error" style="display:none" class="mb-3"></div>
          <div class="mb-3">
            <label class="form-label">PJコード <span class="text-danger">*</span></label>
            <input type="text" id="project-code" class="form-control" placeholder="例：PJ01" maxlength="20" style="text-transform:uppercase">
            <div class="form-text">課題番号のプレフィックスになります（例：PJ01-001）</div>
          </div>
          <div class="mb-3">
            <label class="form-label">プロジェクト名 <span class="text-danger">*</span></label>
            <input type="text" id="project-name" class="form-control" placeholder="例：〇〇コーポレートサイト制作">
          </div>
          <div class="mb-3">
            <label class="form-label">説明</label>
            <textarea id="project-desc" class="form-control" rows="3" placeholder="プロジェクトの概要を入力"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
          <button type="button" class="btn btn-primary" id="create-project-btn">作成</button>
        </div>
      </div>
    </div>
  </div>

  <!-- プロフィール設定モーダル -->
  <div class="modal fade" id="profileModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-person-circle me-2"></i>プロフィール設定</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="text-center mb-4">
            <div id="profile-avatar-preview"
                 style="width:80px;height:80px;margin:0 auto 12px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:32px;color:white;overflow:hidden"></div>
            <label class="btn btn-sm btn-outline-secondary" for="avatar-file-input" style="cursor:pointer">
              <i class="bi bi-camera me-1"></i>画像を変更
              <input type="file" id="avatar-file-input" style="display:none" accept="image/*">
            </label>
          </div>
          <div>
            <label class="form-label fw-semibold" style="font-size:12px;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-muted)">テーマカラー</label>
            <div class="d-flex gap-2 flex-wrap mt-1" id="theme-color-picker"></div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">閉じる</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
