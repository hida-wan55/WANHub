<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダッシュボード - WANHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <!-- サイドバー -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <a href="/dashboard.html">
        <div class="logo-icon"><i class="bi bi-kanban-fill"></i></div>
        WANHub
      </a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">メニュー</div>
      <a href="/dashboard.html" class="sidebar-link active">
        <i class="bi bi-grid-fill"></i> ダッシュボード
      </a>
    </div>
    <div class="sidebar-section" style="flex:1">
      <div class="sidebar-label">プロジェクト</div>
      <div id="sidebar-projects">
        <div class="px-3 py-2" style="font-size:12px;color:rgba(201,214,227,0.4)">読み込み中...</div>
      </div>
    </div>
    <div class="sidebar-footer">
      <div class="user-avatar" id="user-avatar-sidebar">--</div>
      <div class="user-info">
        <div class="user-name" id="user-name-sidebar">-</div>
      </div>
      <button class="logout-btn" onclick="logout()" title="ログアウト">
        <i class="bi bi-box-arrow-right"></i>
      </button>
    </div>
  </div>

  <!-- メインコンテンツ -->
  <div class="main-content">
    <div class="top-header">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
          <li class="breadcrumb-item active">ダッシュボード</li>
        </ol>
      </nav>
      <div class="d-flex gap-2">
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#createProjectModal">
          <i class="bi bi-plus-lg me-1"></i>新規プロジェクト
        </button>
        <a href="/admin.html" class="btn btn-outline-secondary btn-sm" id="admin-btn" style="display:none">
          <i class="bi bi-gear-fill me-1"></i>管理
        </a>
      </div>
    </div>

    <div class="page-content">
      <div id="error-container" style="display:none" class="mb-3"></div>

      <!-- 統計 -->
      <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
          <div class="stat-card">
            <p class="stat-number" id="stat-projects">-</p>
            <p class="stat-label">プロジェクト数</p>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="stat-card">
            <p class="stat-number" id="stat-open">-</p>
            <p class="stat-label">未対応の課題</p>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="stat-card">
            <p class="stat-number" id="stat-in-progress">-</p>
            <p class="stat-label">処理中の課題</p>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="stat-card">
            <p class="stat-number" id="stat-my-issues">-</p>
            <p class="stat-label">自分の担当課題</p>
          </div>
        </div>
      </div>

      <!-- プロジェクト一覧 -->
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h6 class="mb-0 fw-bold" style="font-size:15px">プロジェクト一覧</h6>
      </div>
      <div class="row g-3" id="projects-grid">
        <!-- JS で生成 -->
      </div>
    </div>
  </div>

  <!-- 新規プロジェクト作成モーダル -->
  <div class="modal fade" id="createProjectModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">新規プロジェクト作成</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="modal-error" style="display:none" class="mb-3"></div>
          <div class="mb-3">
            <label class="form-label">プロジェクト名 <span class="text-danger">*</span></label>
            <input type="text" id="project-name" class="form-control" placeholder="例：〇〇コーポレートサイト制作">
          </div>
          <div class="mb-3">
            <label class="form-label">説明</label>
            <textarea id="project-desc" class="form-control" rows="3" placeholder="プロジェクトの概要を入力"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
          <button type="button" class="btn btn-primary" id="create-project-btn">作成</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
